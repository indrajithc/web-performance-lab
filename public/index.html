<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Performance Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app"></div>

  <script>
    const SECTION_DELAY_MS = 1000;

    async function renderSections() {
      const res = await fetch('/sections.json');
      const sections = await res.json();
      const app = document.getElementById('app');

      for (const section of sections) {
        await new Promise((resolve) => setTimeout(resolve, SECTION_DELAY_MS));
        const el = document.createElement(section.tag);
        el.className = section.class;
        el.id = section.id;
        el.innerHTML = section.html;
        app.appendChild(el);
      }
    }

    renderSections();
  </script>

  <!-- add dynamic scripts below -->
</body>
</html>
